      bindNumber('stroke-width', 'strokeWidth');
      bindNumber('radius', 'radius');

      $('dash').addEventListener('input', (e) => {
        const v = parseFloat(e.target.value);
        state.strokeStyle = v > 0 ? 'dashed' : 'solid';
        emit();
      });

      function bindHex(textId, pickerId, key, sub) {
        const setVal = (hex) => {
          if (sub) state[sub][key] = hex;
          else state[key] = hex;
          $(textId).value = hex;
          $(pickerId).value = '#' + hex;
          $(textId).parentElement.querySelector('.swatch').style.background = '#' + hex;
          emit();
        };
        $(textId).addEventListener('input', (e) => setVal(cleanHex(e.target.value)));
        $(pickerId).addEventListener('input', (e) => setVal(cleanHex(e.target.value)));
      }
      bindHex('stroke-color', 'stroke-color-picker', 'strokeColor');
      bindHex('text-color', 'text-color-picker', 'color', 'label');
      bindHex('label-bg-color', 'label-bg-picker', 'background', 'label');

      document.querySelectorAll('#line-type button').forEach((btn) => {
        btn.addEventListener('click', () => {
          state.lineType = btn.dataset.value;
          document.querySelectorAll('#line-type button').forEach((b) =>
            b.classList.toggle('active', b === btn),
          );
          emit();
        });
      });

      $('swap').addEventListener('click', () => {
        const tmpA = state.startArrow;
        state.startArrow = state.endArrow;
        state.endArrow = tmpA;
        syncArrowPickerSelection('picker-start', state.startArrow);
        syncArrowPickerSelection('picker-end', state.endArrow);
        const tmpAnchor = state.startAnchor;
        state.startAnchor = state.endAnchor;
        state.endAnchor = tmpAnchor;
        renderArrowPreviews();
        renderAnchorDots();
        if (mode === 'one-flow' || mode === 'multi-flow') {
          post({ type: 'swap-direction' });
        } else {
          emit();
        }
      });

      document.querySelectorAll('.anchor-dot').forEach((dot) => {
        dot.addEventListener('click', () => {
          const end = dot.dataset.end;
          const side = dot.dataset.side;
          let resetSide = null;
          if (end === 'from') {
            const next = state.startAnchor === side ? 'auto' : side;
            if (next !== state.startAnchor) resetSide = 'start';
            state.startAnchor = next;
          } else {
            const next = state.endAnchor === side ? 'auto' : side;
            if (next !== state.endAnchor) resetSide = 'end';
            state.endAnchor = next;
          }
          // Switching the anchor side rotates the offset axis (Y↔X) so the
          // stored offset becomes meaningless for the new edge. Reset that
          // side to 0.5 so the slider stays in sync with what the user sees.
          if (resetSide === 'start') {
            startOffsetValue = 0.5;
            clearStartMixed();
          } else if (resetSide === 'end') {
            endOffsetValue = 0.5;
            clearEndMixed();
          }
          showDraftAnchors = true;
          renderAnchorDots();
          if (resetSide && (mode === 'one-flow' || mode === 'multi-flow')) {
            applyPathOffsetUi(); // reflect the re-centered slider right away
          }
          // Persist the brush anchor with the active preset, then apply the
          // side change via its OWN message. Anchors are structural, so they
          // must not ride on update-style — otherwise a later label/colour edit
          // re-sends the anchor and can re-route the line. The sandbox
          // re-centers the offset of whichever side actually changed.
          saveActivePresetStyle();
          post({ type: 'update-anchors', startAnchor: state.startAnchor, endAnchor: state.endAnchor });
        });
      });

      $('label-text').addEventListener('input', (e) => {
        state.label.text = e.target.value;
        emit();
      });
      $('font-family').addEventListener('change', (e) => {
        state.label.fontFamily = e.target.value;
        emit();
      });
      $('font-weight').addEventListener('change', (e) => {
        state.label.fontWeight = e.target.value;
        emit();
      });
      $('font-size').addEventListener('input', (e) => {
        const v = parseFloat(e.target.value);
        if (Number.isFinite(v)) {
          state.label.fontSize = v;
          emit();
        }
      });

      // ---- Anchor offset sliders -----------------------------------------
      // Coalesce drags into one message per animation frame: native range
      // input can fire >30 events/sec which would each trigger a full
      // setVectorNetworkAsync cycle in the sandbox.
      let __offsetRaf = null;
      let __pendingStart = null;
      let __pendingEnd = null;
      let __pendingBetween = null;
      function flushAnchorOffsets() {
        __offsetRaf = null;
        const payload = { type: 'update-anchor-offsets' };
        if (__pendingStart !== null) payload.startOffset = __pendingStart;
        if (__pendingEnd !== null) payload.endOffset = __pendingEnd;
        if (__pendingBetween !== null) payload.betweenOffset = __pendingBetween;
        __pendingStart = null;
        __pendingEnd = null;
        __pendingBetween = null;
        post(payload);
      }
      function scheduleAnchorOffsetPost() {
        if (__offsetRaf != null) return;
        __offsetRaf = requestAnimationFrame(flushAnchorOffsets);
      }
      function clearStartMixed() {
        if (!startOffsetMixed) return;
        startOffsetMixed = false;
        $('po-start-row').classList.remove('mixed');
        $('po-start-mixed').hidden = true;
      }
      function clearEndMixed() {
        if (!endOffsetMixed) return;
        endOffsetMixed = false;
        $('po-end-row').classList.remove('mixed');
        $('po-end-mixed').hidden = true;
      }
      function clearBetweenMixed() {
        if (!betweenOffsetMixed) return;
        betweenOffsetMixed = false;
        $('po-between-row').classList.remove('mixed');
        $('po-between-mixed').hidden = true;
      }
      $('po-start-slider').addEventListener('input', (e) => {
        const v = parseFloat(e.target.value);
        if (!Number.isFinite(v)) return;
        startOffsetValue = v;
        clearStartMixed();
        __pendingStart = v;
        scheduleAnchorOffsetPost();
      });
      $('po-end-slider').addEventListener('input', (e) => {
        const v = parseFloat(e.target.value);
        if (!Number.isFinite(v)) return;
        endOffsetValue = v;
        clearEndMixed();
        __pendingEnd = v;
        scheduleAnchorOffsetPost();
      });
      $('po-between-slider').addEventListener('input', (e) => {
        const v = parseFloat(e.target.value);
        if (!Number.isFinite(v)) return;
        betweenOffsetValue = v;
        clearBetweenMixed();
        __pendingBetween = v;
        scheduleAnchorOffsetPost();
      });
      $('po-start-reset').addEventListener('click', () => {
        startOffsetValue = 0.5;
        clearStartMixed();
        $('po-start-slider').value = '0.5';
        if (__offsetRaf != null) {
          cancelAnimationFrame(__offsetRaf);
          __offsetRaf = null;
        }
        __pendingStart = null;
        post({ type: 'update-anchor-offsets', startOffset: 0.5 });
      });
      $('po-end-reset').addEventListener('click', () => {
        endOffsetValue = 0.5;
        clearEndMixed();
        $('po-end-slider').value = '0.5';
        if (__offsetRaf != null) {
          cancelAnimationFrame(__offsetRaf);
          __offsetRaf = null;
        }
        __pendingEnd = null;
        post({ type: 'update-anchor-offsets', endOffset: 0.5 });
      });
      $('po-between-reset').addEventListener('click', () => {
        betweenOffsetValue = 0.5;
        clearBetweenMixed();
        $('po-between-slider').value = '0.5';
        if (__offsetRaf != null) {
          cancelAnimationFrame(__offsetRaf);
          __offsetRaf = null;
        }
        __pendingBetween = null;
        post({ type: 'update-anchor-offsets', betweenOffset: 0.5 });
      });

      // Preset name form
      $('preset-name-confirm').addEventListener('click', confirmAddPreset);
      $('preset-name-cancel').addEventListener('click', hideAddPresetInput);
      $('preset-name-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') confirmAddPreset();
        if (e.key === 'Escape') hideAddPresetInput();
      });

      // -----------------------------------------------------------------
      // Sandbox messages
      // -----------------------------------------------------------------
      window.addEventListener('message', (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;
        if (msg.type === 'selection') {
          mode = msg.mode;
          showDraftAnchors = false;
          active = msg.active;
          resolvedStartSide = msg.resolvedStartSide || null;
          resolvedEndSide = msg.resolvedEndSide || null;
          fromName = msg.fromName || '';
          toName = msg.toName || '';
          // Brush model: the panel always shows the user's active preset /
          // last-set brush (its colour, stroke, arrows, label) — NOT the
          // selected flow's own visual style. Selecting a red "Error" line
          // must not repaint the panel red when the active preset is the cyan
          // Default; the panel represents what you'll paint with, independent
          // of what's selected. We DO sync the structural anchor sides so the
          // anchor dots reflect where the selected flow actually attaches
          // (clicking the already-pinned dot shouldn't toggle it off).
          if (msg.style) {
            state.startAnchor = msg.style.startAnchor || 'auto';
            state.endAnchor = msg.style.endAnchor || 'auto';
          }
          startOffsetValue =
            typeof msg.startOffset === 'number' ? msg.startOffset : 0.5;
          endOffsetValue =
            typeof msg.endOffset === 'number' ? msg.endOffset : 0.5;
          betweenOffsetValue =
            typeof msg.betweenOffset === 'number' ? msg.betweenOffset : 0.5;
          startOffsetMixed = !!msg.startOffsetMixed;
          endOffsetMixed = !!msg.endOffsetMixed;
          betweenOffsetMixed = !!msg.betweenOffsetMixed;
          // Default to supported when the sandbox didn't report it (e.g.
          // initial load before a flow is selected) so the slider isn't
          // perma-disabled — applyPathOffsetUi only uses this flag when
          // the path-offset section is visible.
          betweenOffsetSupported = msg.betweenOffsetSupported !== false;
          applyStateToUi();
          updatePresetUi();
          scheduleResize();
        } else if (msg.type === 'between-support') {
          // Only the disabled state changed — avoid the full
          // applyPathOffsetUi() pass which would write back to every
          // slider's .value (and snap the one the user is actively
          // dragging back to a sandbox echo). Toggle just the Between
          // row's controls in place.
          betweenOffsetSupported = !!msg.supported;
          const betweenSlider = $('po-between-slider');
          const betweenReset = $('po-between-reset');
          const betweenRow = $('po-between-row');
          if (betweenSlider && betweenReset && betweenRow) {
            betweenSlider.disabled = !betweenOffsetSupported;
            betweenReset.disabled = !betweenOffsetSupported;
            betweenRow.classList.toggle('disabled', !betweenOffsetSupported);
          }
        } else if (msg.type === 'preset-styles') {
          savedPresetStyles = normalizePresetStyles(msg.styles || {});
          if (mode !== 'one-flow' && mode !== 'multi-flow') {
            state = cloneStyle(savedPresetStyles['default'] || savedPresetStyles.default || DEFAULTS);
            // If the active preset doesn't remember, the label is transient —
            // drop any text an older build may have baked into the saved preset.
            if (!getRemember(activePreset)) state.label.text = '';
            applyStateToUi();
          }
          renderPresets();
        } else if (msg.type === 'reset-label') {
          // A flow was just created with "remember" off — drop the label text
          // from the brush and the input so it doesn't carry to the next line.
          state.label.text = '';
          const li = $('label-text');
          if (li) li.value = '';
        } else if (msg.type === 'preset-remember') {
          presetRemember = msg.remember || {};
          applyRememberLabel(false); // reflect the loaded flag, don't re-save it
        }
      });

      // -----------------------------------------------------------------
      // Accordion state — persist collapsed/open per-section via localStorage.
      // First-time use (no saved key) leaves all sections open.
      // -----------------------------------------------------------------
      function setAccordionOpen(acc, open) {
        acc.classList.toggle('collapsed', !open);
        const header = acc.querySelector('.accordion-header');
        if (header) header.setAttribute('aria-expanded', open ? 'true' : 'false');
      }
      function initAccordions() {
        document.querySelectorAll('.accordion').forEach((acc) => {
          const key = 'easyflow.acc.' + acc.dataset.accordion;
          let saved = null;
          try { saved = localStorage.getItem(key); } catch (_) {}
          const isOpen = saved === null ? true : saved === '1';
          setAccordionOpen(acc, isOpen);
          const header = acc.querySelector('.accordion-header');
          if (!header) return;
          header.addEventListener('click', () => {
            const next = acc.classList.contains('collapsed');
            setAccordionOpen(acc, next);
            try { localStorage.setItem(key, next ? '1' : '0'); } catch (_) {}
            scheduleResize();
          });
        });
      }

      // -----------------------------------------------------------------
      // Label settings popover
      (function initLabelSettings() {
        const btn = $('label-settings-trigger');
        const panel = $('label-settings-panel');
        if (!btn || !panel) return;
        function close() {
          panel.hidden = true;
          btn.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        }
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const willOpen = panel.hidden;
          close();
          if (willOpen) {
            panel.hidden = false;
            btn.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
          }
        });
        document.addEventListener('pointerdown', (e) => {
          if (!panel.hidden && !btn.contains(e.target) && !panel.contains(e.target)) {
            close();
          }
        }, true);
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && !panel.hidden) close();
        });
      })();

      // Style settings popover
      // -----------------------------------------------------------------
      (function initStyleSettings() {
        const btn = $('style-settings-trigger');
        const panel = $('style-settings-panel');
        if (!btn || !panel) return;
        function close() {
          panel.hidden = true;
          btn.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        }
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const willOpen = panel.hidden;
          close();
          if (willOpen) {
            panel.hidden = false;
            btn.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
          }
        });
        document.addEventListener('pointerdown', (e) => {
          if (!panel.hidden && !btn.contains(e.target) && !panel.contains(e.target)) {
            close();
          }
        }, true);
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && !panel.hidden) close();
        });
      })();

      // -----------------------------------------------------------------
      // Init
      // -----------------------------------------------------------------
      initArrowPickers();
      initAccordions();
      renderPresets();
      applyStateToUi();
      applyRememberLabel(true); // reflect saved pref + sync the sandbox
      // Restore the user's last manual size if they previously dragged the
      // grip — this also sets userHasResized so scheduleResize() bails out
      // and the auto-fit ResizeObserver doesn't fight the restored size.
      const hadSavedSize = applySavedSizeIfAny();
      try {
        new ResizeObserver(() => scheduleResize()).observe(document.documentElement);
      } catch (_) {}
      post({ type: 'ui-ready' });
      if (!hadSavedSize) scheduleResize();
    </script>
  </body>
</html>
