<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>EasyFlow</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --surface-2: #ebedf0;
        --border: #e5e7eb;
        --border-strong: #d1d5db;
        --text: #1f1f1f;
        --text-muted: #6b7280;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
        --danger: #ef4444;
        --radius: 8px;
        --radius-sm: 6px;
        --gap: 10px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, sans-serif;
        font-size: 12px;
      }
      /* html needs an explicit height so its overflow-y: auto can produce a
         scrollbar — without height:100% it just grows to fit body content
         and the overflow rule is a no-op. In auto-fit mode the sandbox
         resizes the window to match the body, so there's nothing to scroll
         and the scrollbar stays hidden; once the user drags smaller than
         content, the scrollbar appears. */
      html { height: 100%; overflow-x: hidden; overflow-y: auto; }
      /* Resize grip — fixed bottom-right corner. Three diagonal slashes
         (macOS / Windows convention) so it's immediately recognizable. */
      .resize-handle {
        position: fixed;
        right: 0;
        bottom: 0;
        width: 22px;
        height: 22px;
        cursor: nwse-resize;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
        background: transparent;
        border-radius: 4px 0 0 0;
        transition: background 120ms ease, color 120ms ease;
      }
      .resize-handle svg {
        opacity: 0.75;
        transition: opacity 120ms ease;
      }
      .resize-handle:hover {
        background: var(--surface-2);
      }
      .resize-handle:hover svg { opacity: 1; }
      /* While resizing, disable selection and force the resize cursor
         globally so the cursor doesn't flicker over text/buttons. */
      html.resizing,
      html.resizing * { cursor: nwse-resize !important; user-select: none !important; }

      .toggle-header {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
      }
      .toggle-header .toggle-row {
        flex: 1;
        min-width: 0;
      }
      /* Compact the toggle row — it sits at the top of the panel and
         doesn't need the same generous padding as content sections. */
      .section.toggle-section {
        padding: 6px 14px;
      }
      .toggle-section .toggle-row .label {
        font-size: 12px;
      }
      /* Sections */
      .section {
        background: var(--surface);
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }
      .section.muted {
        background: var(--surface-2);
      }
      /* Accordion: section header is the toggle. Content sits in
         .accordion-body so the header stays in place when collapsed. */
      .accordion .accordion-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        background: transparent;
        border: 0;
        padding: 0 0 10px 0;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .accordion .accordion-header:hover {
        color: var(--text);
      }
      .accordion .accordion-header .chev {
        transition: transform 0.15s ease;
        flex-shrink: 0;
      }
      .accordion.collapsed .accordion-header {
        padding-bottom: 0;
      }
      .accordion.collapsed .accordion-header .chev {
        transform: rotate(-90deg);
      }
      .accordion.collapsed .accordion-body {
        display: none;
      }
      .accordion .accordion-header-aux {
        font-size: 11px;
        color: var(--accent);
        font-weight: 600;
        text-transform: none;
        letter-spacing: 0;
        margin-left: auto;
        margin-right: 8px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: var(--gap);
      }
      .row + .row {
        margin-top: 8px;
      }
      .row.tight {
        gap: 6px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .toggle-row .label {
        font-size: 13px;
        font-weight: 500;
      }

      /* Switch */
      .switch {
        position: relative;
        width: 36px;
        height: 20px;
        background: var(--border-strong);
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease;
        flex-shrink: 0;
      }
      .switch::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 50%;
        transition: left 0.15s ease;
      }
      .switch.on {
        background: var(--accent);
      }
      .switch.on::after {
        left: 18px;
      }

      /* Field shell */
      .field {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 4px 7px;
        height: 32px;
        flex: 1;
        min-width: 0;
      }
      .field .icon {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
        color: var(--text);
        opacity: 0.85;
      }
      .field input,
      .field select {
        border: 0;
        outline: 0;
        background: transparent;
        font-size: 11px;
        color: var(--text);
        font-family: inherit;
        width: 100%;
        min-width: 0;
        padding: 0;
      }
      .field .swatch {
        width: 16px;
        height: 16px;
        border-radius: 3px;
        border: 1px solid var(--border-strong);
        flex-shrink: 0;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .field .swatch input[type='color'] {
        position: absolute;
        inset: -4px;
        opacity: 0;
        cursor: pointer;
        border: 0;
        padding: 0;
      }
      .field .divider {
        width: 1px;
        height: 16px;
        background: var(--border);
        flex-shrink: 0;
      }
      /* Hex + opacity row: spinner + narrow width was clipping "100" → "10" */
      .field.field-stroke-row input#stroke-color {
        flex: 1 1 auto;
        width: auto;
        min-width: 2.75rem;
        max-width: 100%;
      }
      .field.field-stroke-row input#opacity[type='number'] {
        flex: 0 0 auto;
        width: auto;
        min-width: 3.25rem;
        max-width: 4rem;
        text-align: right;
        -moz-appearance: textfield;
      }
      .field.field-stroke-row input#opacity::-webkit-outer-spin-button,
      .field.field-stroke-row input#opacity::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .pct-suffix {
        color: var(--text-muted);
        flex-shrink: 0;
        user-select: none;
      }

      /* Segmented buttons */
      .segmented {
        display: inline-flex;
        gap: 2px;
        background: var(--surface-2);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .segmented button {
        background: transparent;
        border: 0;
        width: 28px;
        height: 28px;
        border-radius: 4px;
        cursor: pointer;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .segmented button:hover {
        background: rgba(0, 0, 0, 0.04);
      }
      .segmented button.active {
        background: #fff;
        color: var(--accent);
        box-shadow: 0 0 0 1px var(--border);
      }
      .segmented button svg {
        width: 16px;
        height: 16px;
      }

      /* Arrow row — minmax keeps grid tracks from overflowing narrow plugin widths */
      .row.arrow-row-gap {
        margin-top: 14px;
        flex-wrap: nowrap;
        gap: var(--gap);
        min-width: 0;
        max-width: 100%;
      }
      .arrow-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }
      .arrow-row > * {
        min-width: 0;
      }
      .row.arrow-row-gap > .arrow-row {
        flex: 1 1 auto;
        min-width: 0;
      }
      .arrow-field {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 4px 8px;
        min-height: 32px;
        height: auto;
        max-width: 100%;
        box-sizing: border-box;
        /* overflow must be visible so the dropdown panel can pop out */
        overflow: visible;
        position: relative;
      }
      .arrow-field .label {
        color: var(--text-muted);
        font-size: 11px;
        flex-shrink: 0;
      }
      .arrow-field .preview {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-width: 0;
        min-height: 16px;
        color: var(--text);
        overflow: hidden; /* clip just the SVG preview, not the whole field */
      }
      .arrow-field .preview svg {
        display: block;
        height: 14px;
        width: auto;
        max-width: 100%;
        flex-shrink: 1;
      }
      .arrow-picker {
        /* static so panel is positioned relative to .arrow-field above */
        position: static;
        flex: 0 0 auto;
      }
      .arrow-picker-trigger {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 24px;
        border: 0;
        background: transparent;
        cursor: pointer;
        color: var(--text-muted);
        border-radius: 4px;
        padding: 0;
      }
      .arrow-picker-trigger:hover {
        background: rgba(0, 0, 0, 0.06);
        color: var(--text);
      }
      .arrow-picker-trigger .arrow-picker-chevron {
        width: 14px;
        height: 14px;
      }
      .arrow-picker-panel {
        position: absolute;
        /* align to the left edge of the parent .arrow-field */
        left: -1px;
        right: auto;
        top: calc(100% + 4px);
        transform: none;
        z-index: 200;
        display: none;
        flex-direction: column;
        gap: 4px;
        /* at least as wide as the field; grows if options need more space */
        min-width: calc(100% + 2px);
        max-width: min(280px, calc(100vw - 24px));
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.06),
          0 12px 24px rgba(0, 0, 0, 0.12);
        padding: 6px;
      }
      /* [hidden] must not be overridden — author `display:flex` beats default [hidden] otherwise. */
      .arrow-picker-panel:not([hidden]) {
        display: flex;
      }
      .arrow-picker-option {
        border: 0;
        background: transparent;
        cursor: pointer;
        padding: 8px 10px;
        border-radius: var(--radius-sm);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
      }
      .arrow-picker-option svg {
        display: block;
        height: 16px;
        width: 48px;
        overflow: visible;
      }
      .arrow-picker-option:hover {
        background: rgba(37, 99, 235, 0.08);
      }
      .arrow-picker-option.arrow-picker-option-selected {
        background: rgba(37, 99, 235, 0.1);
      }
      .swap-btn {
        flex-shrink: 0;
        background: transparent;
        border: 0;
        cursor: pointer;
        color: var(--accent);
        width: 28px;
        height: 28px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .swap-btn:hover {
        background: rgba(37, 99, 235, 0.08);
      }

      /* Path Offset section — shown only when an EasyFlow flow is selected */
      .path-offset-section {
        background: var(--surface);
      }
      .path-offset-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .path-offset-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .path-offset-reset {
        flex-shrink: 0;
        background: transparent;
        border: 0;
        cursor: pointer;
        color: var(--text-muted);
        width: 22px;
        height: 22px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .path-offset-reset:hover {
        background: var(--surface-2);
        color: var(--text);
      }
      .path-offset-track {
        position: relative;
        height: 24px;
        display: flex;
        align-items: center;
        margin-bottom: 6px;
      }
      .path-offset-ticks {
        position: absolute;
        left: 8px;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        justify-content: space-between;
        pointer-events: none;
      }
      .path-offset-ticks span {
        width: 1px;
        height: 10px;
        background: var(--border-strong);
      }
      .path-offset-track input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
        position: relative;
        z-index: 1;
        margin: 0;
      }
      .path-offset-track input[type='range']::-webkit-slider-runnable-track {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
      }
      .path-offset-track input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        margin-top: -5px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid #ffffff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        cursor: grab;
      }
      .path-offset-track input[type='range']:active::-webkit-slider-thumb {
        cursor: grabbing;
      }
      .path-offset-track input[type='range']:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }
      .path-offset-track input[type='range']:disabled::-webkit-slider-thumb {
        background: var(--text-muted);
      }
      .po-slider-grid {
        display: flex;
        gap: 10px;
        align-items: stretch;
      }
      .po-slider-col {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .po-slider-label {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .po-slider-col.disabled .po-slider-label,
      .po-slider-col.disabled .path-offset-reset {
        opacity: 0.45;
      }
      .po-slider-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .po-slider-col .path-offset-track {
        margin-bottom: 0;
      }
      .po-slider-col.mixed .path-offset-track input[type='range']::-webkit-slider-thumb {
        opacity: 0;
      }
      .path-offset-mixed-label {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-size: 10px;
        font-style: italic;
        color: var(--text-muted);
        background: var(--surface);
        padding: 1px 6px;
        pointer-events: none;
        z-index: 2;
      }
      .path-offset-help {
        font-size: 10px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      /* Anchor preview area */
      .anchor-area {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        padding: 18px 14px;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border);
      }
      .anchor-empty[hidden] { display: none; }
      .anchor-empty {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 0;
        text-align: center;
      }
      .anchor-empty .anchor-empty-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }
      .anchor-empty .anchor-empty-desc {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.5;
      }
      /* author display:flex beats the UA display:none for [hidden] — make it explicit */
      .anchor-frame[hidden] { display: none; }
      .anchor-frame {
        position: relative;
        aspect-ratio: 1.4;
        background: transparent;
        border: 1.5px solid var(--border-strong);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 500;
      }
      .anchor-dot {
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 1.5px solid var(--border-strong);
        cursor: pointer;
        transform: translate(-50%, -50%);
      }
      .anchor-dot:hover {
        border-color: var(--accent);
      }
      .anchor-dot.active {
        background: #fff;
        border-color: var(--accent);
        border-width: 2px;
      }
      /* Resolved (auto-routed) side gets a hollow ring instead of solid fill */
      .anchor-dot.resolved {
        background: #fff;
        border-color: var(--accent);
        border-width: 2px;
      }
      .anchor-dot.active::after,
      .anchor-dot.resolved::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        background: var(--accent);
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      .frame-label {
        position: absolute;
        bottom: -18px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 10px;
        color: var(--text-muted);
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .anchor-dot[data-side='top'] {
        top: 0;
        left: 50%;
      }
      .anchor-dot[data-side='right'] {
        top: 50%;
        left: 100%;
      }
      .anchor-dot[data-side='bottom'] {
        top: 100%;
        left: 50%;
      }
      .anchor-dot[data-side='left'] {
        top: 50%;
        left: 0;
      }

      /* Label section */
      .remember-label-row .label {
        font-size: 12px;
        color: var(--text-muted);
      }
      /* Label text input + remember toggle share one row. */
      .label-text-row .label-input {
        flex: 1;
        width: auto;
        min-width: 0;
      }
      .label-text-row .remember-label-row {
        flex-shrink: 0;
      }
      .label-input {
        width: 100%;
        height: 32px;
        padding: 0 10px;
        font-size: 11px;
        font-family: inherit;
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        outline: 0;
        color: var(--text);
      }
      .label-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
      }
      .row.label-font-row {
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 6px;
      }
      .row.label-font-row > .field.field-font-family {
        flex: 1 1 0;
        min-width: 0;
      }
      .row.label-font-row > .field.field-font-size {
        flex: 0 0 88px;
        min-width: 88px;
      }
      .row.label-font-row > .field.field-font-size input {
        text-align: right;
      }
      .row.label-attrs-row {
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 6px;
      }
      .row.label-attrs-row > .field {
        flex: 1 1 0;
        min-width: 0;
      }

      /* Endpoint info shown when editing existing flow */
      .endpoint-info {
        font-size: 10px;
        color: var(--text-muted);
        text-align: center;
        margin-top: 6px;
      }
      .endpoint-info b {
        color: var(--text);
        font-weight: 500;
      }

      /* Disabled */
      body.disabled .section:not(.toggle-section),
      body.disabled .anchor-area {
        opacity: 0.45;
        pointer-events: none;
      }

      /* Presets */
      .preset-section {
        background: var(--surface);
      }
      .preset-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .preset-label {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .preset-current {
        color: var(--accent);
        font-size: 11px;
        font-weight: 600;
        min-width: 0;
        text-align: right;
      }
      .preset-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      /* Wrapper for user presets (has delete button) */
      .preset-btn-wrap {
        position: relative;
        display: inline-flex;
      }
      .preset-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 6px 10px;
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 12px;
        color: var(--text);
        font-family: inherit;
        font-weight: 500;
        white-space: nowrap;
      }
      .preset-btn:hover {
        border-color: var(--accent);
        background: rgba(37, 99, 235, 0.04);
      }
      .preset-btn:active {
        background: rgba(37, 99, 235, 0.08);
      }
      .preset-btn.active {
        border-color: var(--accent);
        background: rgba(37, 99, 235, 0.08);
        color: var(--accent);
        box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.22);
      }
      .preset-swatch {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        flex-shrink: 0;
        border: 1px solid rgba(0, 0, 0, 0.12);
      }
      /* Delete button — shown on hover over the wrap */
      .preset-delete-btn {
        position: absolute;
        top: -5px;
        right: -5px;
        width: 14px;
        height: 14px;
        background: var(--danger);
        color: #fff;
        border: none;
        border-radius: 50%;
        font-size: 11px;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        opacity: 0;
        transition: opacity 0.12s;
        z-index: 10;
      }
      .preset-btn-wrap:hover .preset-delete-btn {
        opacity: 1;
      }
      /* Add preset button */
      .preset-add-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 10px;
        background: transparent;
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 11px;
        color: var(--text-muted);
        font-family: inherit;
        white-space: nowrap;
      }
      .preset-add-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(37, 99, 235, 0.04);
      }
      /* Inline name form */
      .preset-name-form {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
      }
      .preset-name-input-field {
        flex: 1;
        height: 30px;
        padding: 0 8px;
        font-size: 12px;
        font-family: inherit;
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: var(--radius-sm);
        outline: 0;
        color: var(--text);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
      }
      .preset-name-btn {
        width: 28px;
        height: 28px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-strong);
        background: var(--surface);
        cursor: pointer;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        flex-shrink: 0;
      }
      .preset-name-btn.confirm {
        color: var(--accent);
        border-color: var(--accent);
      }
      .preset-name-btn.cancel {
        color: var(--text-muted);
      }
      .help-section {
        background: var(--surface-2);
        color: var(--text-muted);
        font-size: 11px;
        line-height: 1.45;
      }
      .help-title {
        color: var(--text);
        font-weight: 600;
        margin-bottom: 4px;
      }

      /* Style settings popover */
      .style-settings-wrap {
        position: relative;
        flex-shrink: 0;
      }
      .style-settings-btn {
        width: 32px;
        height: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        cursor: pointer;
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      }
      .style-settings-btn:hover {
        background: var(--surface-2);
        border-color: var(--border-strong);
        color: var(--text);
      }
      .style-settings-btn.open {
        background: rgba(37, 99, 235, 0.08);
        border-color: var(--accent);
        color: var(--accent);
      }
      .style-settings-panel {
        position: absolute;
        right: 0;
        top: calc(100% + 6px);
        z-index: 200;
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.06),
          0 12px 24px rgba(0, 0, 0, 0.12);
        padding: 10px 12px;
        min-width: 210px;
        flex-direction: column;
        gap: 10px;
      }
      .style-settings-panel:not([hidden]) {
        display: flex;
      }
      /* Each row inside the settings popover */
      .ss-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 32px;
      }
      .ss-row-label {
        font-size: 12px;
        color: var(--text);
        flex-shrink: 0;
      }
      .ss-row-control {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }
      /* Compact number field used inside the popover */
      .ss-field {
        display: flex;
        align-items: center;
        gap: 4px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 3px 6px;
        height: 28px;
      }
      .ss-field .icon {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
        color: var(--text-muted);
      }
      .ss-field input[type='number'] {
        border: 0;
        outline: 0;
        background: transparent;
        font-size: 11px;
        color: var(--text);
        font-family: inherit;
        width: 32px;
        text-align: right;
        -moz-appearance: textfield;
      }
      .ss-field input[type='number']::-webkit-outer-spin-button,
      .ss-field input[type='number']::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .ss-field select {
        border: 0;
        outline: 0;
        background: transparent;
        font-size: 11px;
        color: var(--text);
        font-family: inherit;
        min-width: 0;
        flex: 1;
        cursor: pointer;
      }
      .ss-field .swatch {
        width: 16px;
        height: 16px;
        border-radius: 3px;
        border: 1px solid var(--border-strong);
        flex-shrink: 0;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .ss-field .swatch input[type='color'] {
        position: absolute;
        inset: -4px;
        opacity: 0;
        cursor: pointer;
        border: 0;
        padding: 0;
      }
      .ss-field .divider {
        width: 1px;
        height: 14px;
        background: var(--border);
        flex-shrink: 0;
      }
      .ss-field input[type='text'] {
        border: 0;
        outline: 0;
        background: transparent;
        font-size: 11px;
        color: var(--text);
        font-family: inherit;
        width: 44px;
        min-width: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <!-- Drag-to-resize grip (fixed bottom-right) -->
    <div class="resize-handle" id="resize-handle" title="Drag to resize">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <line x1="13" y1="3"  x2="3"  y2="13" />
        <line x1="13" y1="7"  x2="7"  y2="13" />
        <line x1="13" y1="11" x2="11" y2="13" />
      </svg>
    </div>
    <!-- Toggle -->
    <section class="section toggle-section">
      <div class="toggle-header">
        <div class="toggle-row">
          <div class="switch on" id="active-toggle"></div>
          <span class="label">On (Draw on section)</span>
        </div>
      </div>
    </section>

    <!-- Color & line type -->
    <section class="section accordion" data-accordion="style">
      <button type="button" class="accordion-header" aria-expanded="true">
        <span>Style</span>
        <svg class="chev" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="accordion-body">
      <div class="row">
        <div class="field field-stroke-row" style="flex: 1;">
          <span class="swatch" style="background: #00eeff;">
            <input type="color" id="stroke-color-picker" value="#00eeff" />
          </span>
          <input type="text" id="stroke-color" value="00eeff" maxlength="6" inputmode="text" autocomplete="off" spellcheck="false" />
          <span class="divider"></span>
          <input type="number" id="opacity" value="100" min="0" max="100" />
          <span class="pct-suffix">%</span>
        </div>
        <div class="style-settings-wrap">
          <button
            type="button"
            class="style-settings-btn"
            id="style-settings-trigger"
            aria-expanded="false"
            aria-haspopup="true"
            title="Stroke &amp; line settings"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <line x1="4" y1="6" x2="20" y2="6"/>
              <circle cx="8" cy="6" r="2" fill="currentColor" stroke="none"/>
              <line x1="4" y1="12" x2="20" y2="12"/>
              <circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/>
              <line x1="4" y1="18" x2="20" y2="18"/>
              <circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/>
            </svg>
          </button>
          <div class="style-settings-panel" id="style-settings-panel" hidden>
            <!-- Line type -->
            <div class="ss-row">
              <span class="ss-row-label">Line type</span>
              <div class="ss-row-control">
                <div class="segmented" id="line-type">
                  <button data-value="step" class="active" title="Step (orthogonal)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                      <path d="M4 18 H10 V6 H20" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                  </button>
                  <button data-value="curved" title="Curved">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                      <path d="M4 18 C 10 18, 14 6, 20 6" stroke-linecap="round" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <!-- Stroke width -->
            <div class="ss-row">
              <span class="ss-row-label">Stroke width</span>
              <div class="ss-row-control">
                <div class="ss-field">
                  <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="3" y="6" width="18" height="2" /><rect x="3" y="11" width="18" height="3" /><rect x="3" y="17" width="18" height="4" />
                  </svg>
                  <input type="number" id="stroke-width" value="4" min="0" max="40" step="1" />
                </div>
              </div>
            </div>
            <!-- Radius -->
            <div class="ss-row">
              <span class="ss-row-label">Corner radius</span>
              <div class="ss-row-control">
                <div class="ss-field">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
                    <path d="M4 20 V12 A8 8 0 0 1 12 4 H20" stroke-linecap="round" />
                  </svg>
                  <input type="number" id="radius" value="20" min="0" max="200" step="1" />
                </div>
              </div>
            </div>
            <!-- Dash -->
            <div class="ss-row">
              <span class="ss-row-label">Dash gap</span>
              <div class="ss-row-control">
                <div class="ss-field">
                  <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4">
                    <path d="M3 12 H7 M11 12 H15 M19 12 H21" stroke-linecap="round" />
                  </svg>
                  <input type="number" id="dash" value="0" min="0" max="40" step="1" title="Dash gap (0 = solid)" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Arrow row -->
      <div class="row arrow-row-gap">
        <div class="arrow-row">
          <div class="arrow-field">
            <span class="label">Start</span>
            <span class="preview" id="start-preview" aria-hidden="true"></span>
            <div class="arrow-picker" id="picker-start">
              <button
                type="button"
                class="arrow-picker-trigger"
                id="start-arrow-trigger"
                aria-expanded="false"
                aria-haspopup="listbox"
                aria-label="เลือกหัวลูกศรฝั่งเริ่ม"
              >
                <svg class="arrow-picker-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </button>
              <div class="arrow-picker-panel" id="start-arrow-panel" hidden role="listbox" aria-label="ประเภทหัวเส้นฝั่งเริ่ม"></div>
            </div>
          </div>
          <button class="swap-btn" id="swap" title="สลับทิศ" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M7 7 H17 M14 4 L17 7 L14 10 M17 17 H7 M10 14 L7 17 L10 20" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <div class="arrow-field">
            <span class="label">End</span>
            <span class="preview" id="end-preview" aria-hidden="true"></span>
            <div class="arrow-picker" id="picker-end">
              <button
                type="button"
                class="arrow-picker-trigger"
                id="end-arrow-trigger"
                aria-expanded="false"
                aria-haspopup="listbox"
                aria-label="เลือกหัวลูกศรฝั่งปลาย"
              >
                <svg class="arrow-picker-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </button>
              <div class="arrow-picker-panel" id="end-arrow-panel" hidden role="listbox" aria-label="ประเภทหัวเส้นฝั่งปลาย"></div>
            </div>
          </div>
        </div>
      </div>
      </div>
    </section>

    <!-- Anchor area -->
    <div class="anchor-area" id="anchor-area">
      <div class="anchor-empty" id="anchor-empty" hidden>
        <div class="anchor-empty-title">How to connect objects</div>
        <div class="anchor-empty-desc">Select an object → hold Shift<br>→ select another</div>
      </div>
      <div class="anchor-frame" id="from-frame">
        Start
        <span class="anchor-dot" data-end="from" data-side="top"></span>
        <span class="anchor-dot" data-end="from" data-side="right"></span>
        <span class="anchor-dot" data-end="from" data-side="bottom"></span>
        <span class="anchor-dot" data-end="from" data-side="left"></span>
        <div class="frame-label" id="from-name"></div>
      </div>
      <div class="anchor-frame" id="to-frame">
        End
        <span class="anchor-dot" data-end="to" data-side="top"></span>
        <span class="anchor-dot" data-end="to" data-side="right"></span>
        <span class="anchor-dot" data-end="to" data-side="bottom"></span>
        <span class="anchor-dot" data-end="to" data-side="left"></span>
        <div class="frame-label" id="to-name"></div>
      </div>
    </div>
    <!-- Path Offset section: per-endpoint anchor sliders (visible only when a flow is selected) -->
    <section class="section path-offset-section" id="path-offset-section" hidden>
      <div class="po-slider-grid">
        <div class="po-slider-col" id="po-start-row">
          <div class="po-slider-head">
            <span class="po-slider-label">Start path offset</span>
            <button
              type="button"
              class="path-offset-reset"
              id="po-start-reset"
              title="Reset start offset"
              aria-label="Reset start offset"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
                <path d="M3 12a9 9 0 1 0 3.2-6.9" />
                <path d="M3 4v5h5" />
              </svg>
            </button>
          </div>
          <div class="path-offset-track">
            <div class="path-offset-ticks" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <input
              type="range"
              id="po-start-slider"
              min="0"
              max="1"
              step="0.001"
              value="0.5"
              aria-label="Start anchor offset"
            />
            <div class="path-offset-mixed-label" id="po-start-mixed" hidden>Mixed</div>
          </div>
        </div>

        <div class="po-slider-col" id="po-end-row">
          <div class="po-slider-head">
            <span class="po-slider-label">End path offset</span>
            <button
              type="button"
              class="path-offset-reset"
              id="po-end-reset"
              title="Reset end offset"
              aria-label="Reset end offset"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
                <path d="M3 12a9 9 0 1 0 3.2-6.9" />
                <path d="M3 4v5h5" />
              </svg>
            </button>
          </div>
          <div class="path-offset-track">
            <div class="path-offset-ticks" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <input
              type="range"
              id="po-end-slider"
              min="0"
              max="1"
              step="0.001"
              value="0.5"
              aria-label="End anchor offset"
            />
            <div class="path-offset-mixed-label" id="po-end-mixed" hidden>Mixed</div>
          </div>
        </div>

        <div class="po-slider-col" id="po-between-row">
          <div class="po-slider-head">
            <span class="po-slider-label">Between offset</span>
            <button
              type="button"
              class="path-offset-reset"
              id="po-between-reset"
              title="Reset between offset"
              aria-label="Reset between offset"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
                <path d="M3 12a9 9 0 1 0 3.2-6.9" />
                <path d="M3 4v5h5" />
              </svg>
            </button>
          </div>
          <div class="path-offset-track">
            <div class="path-offset-ticks" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <input
              type="range"
              id="po-between-slider"
              min="0"
              max="1"
              step="0.001"
              value="0.5"
              aria-label="Between (middle segment) offset"
            />
            <div class="path-offset-mixed-label" id="po-between-mixed" hidden>Mixed</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Label section -->
    <section class="section accordion" id="label-section" data-accordion="label">
      <button type="button" class="accordion-header" aria-expanded="true">
        <span>Label</span>
        <svg class="chev" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="accordion-body">
      <div class="row label-text-row">
        <input
          type="text"
          class="label-input"
          id="label-text"
          placeholder="Label"
        />
        <div class="toggle-row remember-label-row" title="Remember the label text on newly created lines">
          <div class="switch" id="remember-label-toggle"></div>
          <span class="label">remember</span>
        </div>
      </div>
      <div class="row label-font-row">
        <div class="field field-font-family">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <text x="2" y="18" font-size="16" font-weight="700">Aa</text>
          </svg>
          <select id="font-family">
            <option>Inter</option>
            <option>Roboto</option>
            <option>SF Pro Text</option>
            <option>Helvetica</option>
            <option>Arial</option>
          </select>
        </div>
        <div class="field field-font-size">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <text x="2" y="18" font-size="14" font-weight="700">tT</text>
          </svg>
          <input type="number" id="font-size" value="16" min="4" max="200" step="1" />
        </div>
        <div class="style-settings-wrap">
          <button
            type="button"
            class="style-settings-btn"
            id="label-settings-trigger"
            aria-expanded="false"
            aria-haspopup="true"
            title="Font &amp; color settings"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <line x1="4" y1="6" x2="20" y2="6"/>
              <circle cx="8" cy="6" r="2" fill="currentColor" stroke="none"/>
              <line x1="4" y1="12" x2="20" y2="12"/>
              <circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/>
              <line x1="4" y1="18" x2="20" y2="18"/>
              <circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/>
            </svg>
          </button>
          <div class="style-settings-panel" id="label-settings-panel" hidden>
            <!-- Font weight -->
            <div class="ss-row">
              <span class="ss-row-label">Font weight</span>
              <div class="ss-row-control">
                <div class="ss-field">
                  <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <text x="4" y="18" font-size="16" font-weight="700">B</text>
                  </svg>
                  <select id="font-weight">
                    <option>Thin</option>
                    <option>Light</option>
                    <option selected>Regular</option>
                    <option>Medium</option>
                    <option>Semi Bold</option>
                    <option>Bold</option>
                    <option>Black</option>
                  </select>
                </div>
              </div>
            </div>
            <!-- Text color -->
            <div class="ss-row">
              <span class="ss-row-label">Text color</span>
              <div class="ss-row-control">
                <div class="ss-field">
                  <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2 20h20v3H2zM5.5 17l1.41-3.5h6.18L14.5 17h2.5L11.25 3h-2.5L3 17h2.5zm4.5-12.78L12.36 11H7.64L10 4.22z" />
                  </svg>
                  <input type="text" id="text-color" value="000000" maxlength="6" inputmode="text" autocomplete="off" spellcheck="false" />
                  <span class="divider"></span>
                  <span class="swatch" style="background: #000;">
                    <input type="color" id="text-color-picker" value="#000000" />
                  </span>
                </div>
              </div>
            </div>
            <!-- Background color -->
            <div class="ss-row">
              <span class="ss-row-label">Background</span>
              <div class="ss-row-control">
                <div class="ss-field">
                  <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16.56 8.94 7.62 0 6.21 1.41l2.38 2.38-5.15 5.15a1.49 1.49 0 0 0 0 2.12l5.5 5.5a1.49 1.49 0 0 0 2.12 0l5.5-5.5a1.49 1.49 0 0 0 0-2.12zM5.21 10 10 5.21 14.79 10zm14.29.04s-2 2.17-2 3.5a2 2 0 0 0 4 0c0-1.33-2-3.5-2-3.5zM2 22h20v-3H2z" />
                  </svg>
                  <input type="text" id="label-bg-color" value="ffffff" maxlength="6" inputmode="text" autocomplete="off" spellcheck="false" />
                  <span class="divider"></span>
                  <span class="swatch" style="background: #fff;">
                    <input type="color" id="label-bg-picker" value="#ffffff" />
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      </div>
    </section>

    <!-- Presets -->
    <section class="section preset-section accordion" data-accordion="presets">
      <button type="button" class="accordion-header" aria-expanded="true">
        <span>Presets</span>
        <span class="accordion-header-aux" id="preset-current">Using: Default</span>
        <svg class="chev" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="accordion-body">
      <!-- Dynamically populated by renderPresets() -->
      <div class="preset-row" id="preset-row"></div>
      <!-- Inline name form (shown when adding a preset) -->
      <div class="preset-name-form" id="preset-name-form" style="display:none;">
        <input type="text" id="preset-name-input" class="preset-name-input-field" placeholder="Preset name" maxlength="30" />
        <button type="button" id="preset-name-confirm" class="preset-name-btn confirm" title="Confirm">✓</button>
        <button type="button" id="preset-name-cancel" class="preset-name-btn cancel" title="Cancel">✕</button>
      </div>
      </div>
    </section>



    <script>
      // -----------------------------------------------------------------
      // State
      // -----------------------------------------------------------------
      const DEFAULTS = {
        strokeColor: '00eeff',
        opacity: 100,
        strokeWidth: 4,
        strokeStyle: 'solid',
        lineType: 'step',
        radius: 20,
        startArrow: 'none',
        endArrow: 'arrow',
        startAnchor: 'auto',
        endAnchor: 'auto',
        label: {
          text: '',
          fontFamily: 'Inter',
          fontWeight: 'Regular',
          fontSize: 16,
          color: '000000',
          background: 'ffffff',
          backgroundEnabled: true,
          borderEnabled: true,
        },
      };

      let state = JSON.parse(JSON.stringify(DEFAULTS));
      let active = true;
      let mode = 'none';
      let suppressEmit = false;
      let resolvedStartSide = null;
      let resolvedEndSide = null;
      let fromName = '';
      let toName = '';
      let showDraftAnchors = false;

      // Per-endpoint anchor offsets. 0.5 = center of edge; 0 = bottom/left;
      // 1 = top/right (axis depends on which side the anchor sits on).
      let startOffsetValue = 0.5;
      let endOffsetValue = 0.5;
      let betweenOffsetValue = 0.5;
      let startOffsetMixed = false;
      let endOffsetMixed = false;
      let betweenOffsetMixed = false;
      // Between slider is disabled when the path has no slidable middle
      // segment (straight horizontal/vertical, or wrap-around routing).
      let betweenOffsetSupported = true;

      const BUILT_IN_PRESETS = ['default'];

      const DEFAULT_PRESETS = {
        default: JSON.parse(JSON.stringify(DEFAULTS)),
        success: {
          strokeColor: '22c55e',
          opacity: 100,
          strokeWidth: 4,
          strokeStyle: 'solid',
          lineType: 'step',
          radius: 20,
          startArrow: 'none',
          endArrow: 'arrow',
          startAnchor: 'auto',
          endAnchor: 'auto',
          label: Object.assign({}, DEFAULTS.label, { text: 'Success', fontSize: 16 }),
        },
        error: {
          strokeColor: 'ef4444',
          opacity: 100,
          strokeWidth: 4,
          strokeStyle: 'solid',
          lineType: 'step',
          radius: 20,
          startArrow: 'none',
          endArrow: 'arrow',
          startAnchor: 'auto',
          endAnchor: 'auto',
          label: Object.assign({}, DEFAULTS.label, { text: 'Error', fontSize: 16 }),
        },
      };

      let savedPresetStyles = JSON.parse(JSON.stringify(DEFAULT_PRESETS));
      let activePreset = 'default';

      // -----------------------------------------------------------------
      // Helpers
      // -----------------------------------------------------------------
      const $ = (id) => document.getElementById(id);
      const cleanHex = (v) => (v || '').replace('#', '').toLowerCase().replace(/[^0-9a-f]/g, '').slice(0, 6).padEnd(6, '0');
      const cloneStyle = (style) => JSON.parse(JSON.stringify(style));

      function mergeStyle(base, patch) {
        const next = Object.assign(cloneStyle(DEFAULTS), cloneStyle(base), cloneStyle(patch));
        next.label = Object.assign({}, DEFAULTS.label, base.label || {}, patch.label || {});
        if (patch.labelFontSize !== undefined) next.label.fontSize = patch.labelFontSize;
        delete next.labelFontSize;
        // Strip non-style fields that older builds may have baked into a saved
        // preset. Offsets/anchors-as-position belong to the FLOW, not the
        // style/brush — leaving them here leaks them into update-style and
        // re-routes the line on the next edit.
        delete next.startOffset;
        delete next.endOffset;
        delete next.betweenOffset;
        delete next.fromNodeId;
        delete next.toNodeId;
        delete next.labelNodeId;
        delete next.fromFrameUuid;
        delete next.toFrameUuid;
        return next;
      }

      function presetLabel(name) {
        const labels = { default: 'Default', success: 'Success', error: 'Error' };
        if (labels[name]) return labels[name];
        return name;
      }

      // -----------------------------------------------------------------
      // Preset normalization (handles legacy 'custom' → 'default' migration)
      // -----------------------------------------------------------------

      function normalizePresetStyle(name, style) {
        const base = DEFAULT_PRESETS[name] || DEFAULTS;
        if (!style) return cloneStyle(base);
        return mergeStyle(base, style);
      }

      function normalizePresetStyles(styles) {
        const src = Object.assign({}, styles);
        // Migrate legacy 'custom' key to 'default'
        if (src.custom && !src.default) {
          src.default = src.custom;
        }
        delete src.custom;

        const next = {};
        // Built-ins first (always present)
        BUILT_IN_PRESETS.forEach((name) => {
          next[name] = normalizePresetStyle(name, src[name]);
        });
        // User presets
        Object.keys(src)
          .filter((n) => !BUILT_IN_PRESETS.includes(n))
          .forEach((name) => {
            next[name] = normalizePresetStyle(name, src[name]);
          });
        return next;
      }

      // -----------------------------------------------------------------
      // Preset rendering
      // -----------------------------------------------------------------

      function renderPresets() {
        const row = $('preset-row');
        if (!row) return;
        row.innerHTML = '';

        const allNames = [
          ...BUILT_IN_PRESETS.filter((n) => savedPresetStyles[n]),
          ...Object.keys(savedPresetStyles).filter((n) => !BUILT_IN_PRESETS.includes(n)),
        ];

        allNames.forEach((name) => {
          const style = savedPresetStyles[name];
          const isBuiltIn = BUILT_IN_PRESETS.includes(name);

          const wrap = document.createElement('div');
          wrap.className = 'preset-btn-wrap';

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'preset-btn';
          btn.dataset.preset = name;
          btn.setAttribute('aria-pressed', 'false');

          const swatch = document.createElement('span');
          swatch.className = 'preset-swatch';
          swatch.style.background = '#' + (style ? style.strokeColor : '00eeff');

          const lbl = document.createElement('span');
          lbl.textContent = presetLabel(name);

          btn.appendChild(swatch);
          btn.appendChild(lbl);
          btn.addEventListener('click', () => applyPreset(name));
          wrap.appendChild(btn);

          if (!isBuiltIn) {
            const delBtn = document.createElement('button');
            delBtn.type = 'button';
            delBtn.className = 'preset-delete-btn';
            delBtn.title = 'Delete "' + name + '"';
            delBtn.textContent = '×';
            delBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              deletePreset(name);
            });
            wrap.appendChild(delBtn);
          }

          row.appendChild(wrap);
        });

        // "+ Add" button
        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'preset-add-btn';
        addBtn.id = 'preset-add-btn-dynamic';
        addBtn.textContent = '+ Add';
        addBtn.addEventListener('click', showAddPresetInput);
        row.appendChild(addBtn);

        updatePresetUi();
        scheduleResize();
      }

      function updatePresetUi() {
        document.querySelectorAll('.preset-btn').forEach((btn) => {
          const isActive = btn.dataset.preset === activePreset;
          btn.classList.toggle('active', isActive);
          btn.setAttribute('aria-pressed', String(isActive));
        });
        const current = $('preset-current');
        if (current) current.textContent = 'Using: ' + presetLabel(activePreset);
      }

      function updatePresetSwatch(name) {
        const style = savedPresetStyles[name];
        if (!style) return;
        document.querySelectorAll('.preset-btn[data-preset="' + name + '"] .preset-swatch').forEach((sw) => {
          sw.style.background = '#' + style.strokeColor;
        });
      }

      // -----------------------------------------------------------------
      // Preset actions
      // -----------------------------------------------------------------

      function applyPreset(name) {
        const p = savedPresetStyles[name];
        if (!p) return;
        activePreset = name;
        // A preset is a visual style template (color, width, line type,
        // arrows, label) — NOT routing. The user-aimed anchor sides and
        // per-edge offsets describe where the line attaches to its frames,
        // and switching the look of the line shouldn't reposition it.
        // Preserve those fields across the swap.
        const prevStartAnchor = state.startAnchor;
        const prevEndAnchor = state.endAnchor;
        state = cloneStyle(p);
        state.startAnchor = prevStartAnchor;
        state.endAnchor = prevEndAnchor;
        // "Remember label" off means this preset doesn't auto-fill a label —
        // start empty rather than loading the preset's stored text. (The
        // stored text is kept on the preset, so toggling remember back on
        // restores it.)
        if (!getRemember(name)) state.label.text = '';
        applyStateToUi();
        updatePresetUi();
        applyRememberLabel(true); // toggle + sandbox follow the new preset
        emit();
      }

      function deletePreset(name) {
        if (BUILT_IN_PRESETS.includes(name)) return;
        delete savedPresetStyles[name];
        if (activePreset === name) {
          activePreset = 'default';
          state = cloneStyle(savedPresetStyles['default'] || DEFAULTS);
          applyStateToUi();
          applyRememberLabel(true); // fell back to Default → sync the toggle
        }
        renderPresets();
        post({ type: 'save-preset-styles', styles: savedPresetStyles });
      }

      function showAddPresetInput() {
        const form = $('preset-name-form');
        if (!form) return;
        form.style.display = 'flex';
        const input = $('preset-name-input');
        let n = 1;
        while (savedPresetStyles['Preset ' + n]) n++;
        input.value = 'Preset ' + n;
        input.focus();
        input.select();
        scheduleResize();
      }

      function hideAddPresetInput() {
        const form = $('preset-name-form');
        if (form) form.style.display = 'none';
        scheduleResize();
      }

      function confirmAddPreset() {
        const input = $('preset-name-input');
        const name = (input ? input.value : '').trim();
        if (!name) { hideAddPresetInput(); return; }
        // Newly-created presets start from defaults (cyan) with no label,
        // not from whatever the user happened to have on screen. Keeps
        // "+ Add" predictable instead of capturing accidental state.
        const fresh = cloneStyle(DEFAULTS);
        fresh.label = Object.assign({}, DEFAULTS.label, { text: '' });
        savedPresetStyles[name] = fresh;
        activePreset = name;
        // Preserve the user's current anchor selections — the new preset is
        // a style template; the routing they've aimed shouldn't snap back
        // to 'auto' just because they added a new color swatch.
        const prevStartAnchor = state.startAnchor;
        const prevEndAnchor = state.endAnchor;
        state = cloneStyle(fresh);
        state.startAnchor = prevStartAnchor;
        state.endAnchor = prevEndAnchor;
        applyStateToUi();
        applyRememberLabel(true); // new preset → remember defaults off
        hideAddPresetInput();
        renderPresets();
        post({ type: 'save-preset-styles', styles: savedPresetStyles });
        emit(true);
      }

      function savePresetStyle(name, style) {
        savedPresetStyles[name] = cloneStyle(style);
        updatePresetSwatch(name);
        post({ type: 'save-preset-styles', styles: savedPresetStyles });
      }

      function saveActivePresetStyle() {
        const name = activePreset || 'default';
        // Label text is per-line content. When THIS preset remembers, bake
        // whatever's on screen into the saved preset. When it doesn't, the
        // on-screen label is transient (empty by default, or a one-off the
        // user typed) — keep the preset's stored label intact rather than
        // letting that transient value overwrite it, so toggling remember
        // back on restores the label the preset had.
        let style = state;
        if (!getRemember(name)) {
          style = cloneStyle(state);
          const existing = savedPresetStyles[name];
          style.label.text = existing && existing.label ? (existing.label.text || '') : '';
        }
        savePresetStyle(name, style);
      }

      function post(msg) {
        parent.postMessage({ pluginMessage: msg }, '*');
      }

      /** Match Figma panel height to document (no empty gap under content).
       *  We measure the bottom of the last visible child rather than the
       *  documentElement: documentElement reflects the iframe's current size
       *  (set by Figma's previous resize), so MAX-ing against it prevents
       *  shrinking when accordions collapse. */
      let __resizeRaf = null;
      function scheduleResize() {
        // Once the user takes manual control via the resize grip, auto-fit
        // shouldn't fight back on every accordion toggle / selection change.
        if (userHasResized) return;
        if (__resizeRaf != null) cancelAnimationFrame(__resizeRaf);
        __resizeRaf = requestAnimationFrame(() => {
          __resizeRaf = null;
          let bottom = 0;
          for (const el of document.body.children) {
            if (el.id === 'resize-handle') continue;
            if (el.offsetParent === null && getComputedStyle(el).position !== 'fixed') continue;
            const rect = el.getBoundingClientRect();
            if (rect.bottom > bottom) bottom = rect.bottom;
          }
          const h = Math.ceil(bottom);
          post({ type: 'resize-ui', height: h });
        });
      }

      // -----------------------------------------------------------------
      // Drag-to-resize (bottom-right grip)
      // -----------------------------------------------------------------
      // Bounds mirror the sandbox clamp in code.ts. Keep them in sync.
      const MIN_W = 320, MAX_W = 720;
      const MIN_H = 260, MAX_H = 1200;
      const SIZE_KEY_W = 'easyflow.size.w';
      const SIZE_KEY_H = 'easyflow.size.h';
      let userHasResized = false;

      function readSavedSize() {
        try {
          const w = parseInt(localStorage.getItem(SIZE_KEY_W) || '', 10);
          const h = parseInt(localStorage.getItem(SIZE_KEY_H) || '', 10);
          if (Number.isFinite(w) && Number.isFinite(h)) return { w, h };
        } catch (_) {}
        return null;
      }
      function saveSize(w, h) {
        try {
          localStorage.setItem(SIZE_KEY_W, String(w));
          localStorage.setItem(SIZE_KEY_H, String(h));
        } catch (_) {}
      }
      function applySavedSizeIfAny() {
        const saved = readSavedSize();
        if (!saved) return false;
        userHasResized = true;
        post({ type: 'resize-ui', width: saved.w, height: saved.h });
        return true;
      }

      (function initResizeHandle() {
        const grip = document.getElementById('resize-handle');
        if (!grip) return;
        let startX = 0, startY = 0, startW = 0, startH = 0;
        let curW = 0, curH = 0;
        let dragRaf = null;
        let dragging = false;

        function flushDrag() {
          dragRaf = null;
          post({ type: 'resize-ui', width: curW, height: curH });
        }
        function onMove(e) {
          if (!dragging) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          curW = Math.min(MAX_W, Math.max(MIN_W, Math.round(startW + dx)));
          curH = Math.min(MAX_H, Math.max(MIN_H, Math.round(startH + dy)));
          if (dragRaf == null) dragRaf = requestAnimationFrame(flushDrag);
        }
        function onUp() {
          if (!dragging) return;
          dragging = false;
          document.documentElement.classList.remove('resizing');
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          if (dragRaf != null) { cancelAnimationFrame(dragRaf); dragRaf = null; }
          saveSize(curW, curH);
        }
        grip.addEventListener('mousedown', (e) => {
          e.preventDefault();
          dragging = true;
          startX = e.clientX;
          startY = e.clientY;
          // window.innerWidth/Height reflects the current iframe size, which
          // is what Figma resized us to last — perfect baseline for the drag.
          startW = window.innerWidth;
          startH = window.innerHeight;
          curW = startW;
          curH = startH;
          userHasResized = true;
          document.documentElement.classList.add('resizing');
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
        });
      })();

      // Coalesce rapid input events (keystrokes, slider drags, color picker)
      // into one message per animation frame. Without this, dragging a slider
      // can fire 30–60 'update-style' messages per second, each triggering a
      // full setVectorNetworkAsync cycle in the sandbox.
      let __emitRaf = null;
      function emit(immediate) {
        if (suppressEmit) return;
        saveActivePresetStyle();
        if (immediate) {
          if (__emitRaf != null) { cancelAnimationFrame(__emitRaf); __emitRaf = null; }
          post({ type: 'update-style', style: state });
          return;
        }
        if (__emitRaf != null) return;
        __emitRaf = requestAnimationFrame(() => {
          __emitRaf = null;
          post({ type: 'update-style', style: state });
        });
      }

      function applyStateToUi() {
        suppressEmit = true;
        $('stroke-color').value = state.strokeColor;
        $('stroke-color-picker').value = '#' + state.strokeColor;
        document.querySelector('#stroke-color').parentElement.querySelector('.swatch').style.background = '#' + state.strokeColor;
        $('opacity').value = state.opacity;
        $('stroke-width').value = state.strokeWidth;
        $('radius').value = state.radius;
        $('dash').value = state.strokeStyle === 'dashed' ? Math.max(1, state.strokeWidth * 2) : 0;
        document.querySelectorAll('#line-type button').forEach((b) => {
          b.classList.toggle('active', b.dataset.value === state.lineType);
        });
        syncArrowPickerSelection('picker-start', state.startArrow);
        syncArrowPickerSelection('picker-end', state.endArrow);
        $('label-text').value = state.label.text;
        $('font-family').value = state.label.fontFamily;
        $('font-weight').value = state.label.fontWeight;
        $('font-size').value = state.label.fontSize;
        $('text-color').value = state.label.color;
        $('text-color-picker').value = '#' + state.label.color;
        document.querySelector('#text-color').parentElement.querySelector('.swatch').style.background = '#' + state.label.color;
        $('label-bg-color').value = state.label.background;
        $('label-bg-picker').value = '#' + state.label.background;
        document.querySelector('#label-bg-color').parentElement.querySelector('.swatch').style.background = '#' + state.label.background;
        // The Label section only applies to an actual connector — show it only
        // when a flow is selected (creating a flow selects it too).
        const labelSection = $('label-section');
        if (labelSection) labelSection.hidden = !(mode === 'one-flow' || mode === 'multi-flow');
        // Show help placeholder in anchor area when nothing is selected
        const showFrames = mode === 'one-flow' || mode === 'two-frames' || mode === 'multi-flow';
        const anchorEmpty = $('anchor-empty');
        const fromFrame = $('from-frame');
        const toFrame = $('to-frame');
        if (anchorEmpty) anchorEmpty.hidden = showFrames;
        if (fromFrame) fromFrame.hidden = !showFrames;
        if (toFrame) toFrame.hidden = !showFrames;
        renderAnchorDots();
        renderArrowPreviews();
        renderEndpointInfo();
        applyPathOffsetUi();
        $('active-toggle').classList.toggle('on', active);
        document.body.classList.toggle('disabled', !active);
        suppressEmit = false;
        scheduleResize();
      }

      // Show / hide the Path Offset section. Visible whenever a flow (or
      // flows) is selected. Per-slider "Mixed" overlay appears when a
      // multi-select has differing values for that endpoint.
      function applyPathOffsetUi() {
        const section = $('path-offset-section');
        if (!section) return;
        const visible = mode === 'one-flow' || mode === 'multi-flow';
        section.hidden = !visible;
        if (!visible) return;

        const startRow = $('po-start-row');
        const endRow = $('po-end-row');
        const betweenRow = $('po-between-row');
        const startSlider = $('po-start-slider');
        const endSlider = $('po-end-slider');
        const betweenSlider = $('po-between-slider');
        const startMixed = $('po-start-mixed');
        const endMixed = $('po-end-mixed');
        const betweenMixed = $('po-between-mixed');

        startRow.classList.toggle('mixed', startOffsetMixed);
        endRow.classList.toggle('mixed', endOffsetMixed);
        betweenRow.classList.toggle('mixed', betweenOffsetMixed);
        startMixed.hidden = !startOffsetMixed;
        endMixed.hidden = !endOffsetMixed;
        betweenMixed.hidden = !betweenOffsetMixed;
        // Center the handle visually when mixed so it has a neutral starting
        // point if the user grabs it.
        startSlider.value = String(startOffsetMixed ? 0.5 : startOffsetValue);
        endSlider.value = String(endOffsetMixed ? 0.5 : endOffsetValue);
        betweenSlider.value = String(betweenOffsetMixed ? 0.5 : betweenOffsetValue);
        // Disable the between slider for straight-line / wrap-around paths
        // where there's no meaningful middle segment to slide.
        betweenSlider.disabled = !betweenOffsetSupported;
        betweenRow.classList.toggle('disabled', !betweenOffsetSupported);
        $('po-between-reset').disabled = !betweenOffsetSupported;
      }

      function renderAnchorDots() {
        const showAnchorState = mode === 'one-flow' || showDraftAnchors;
        document.querySelectorAll('.anchor-dot').forEach((dot) => {
          const end = dot.dataset.end;
          const side = dot.dataset.side;
          const pinned = end === 'from' ? state.startAnchor : state.endAnchor;
          const resolved = end === 'from' ? resolvedStartSide : resolvedEndSide;
          const isPinned = showAnchorState && pinned !== 'auto' && pinned === side;
          const isResolved = showAnchorState && mode === 'one-flow' && !isPinned && pinned === 'auto' && resolved === side;
          dot.classList.toggle('active', isPinned);
          dot.classList.toggle('resolved', isResolved);
        });
      }

      function renderEndpointInfo() {
        $('from-name').textContent = fromName || '';
        $('to-name').textContent = toName || '';
      }

      function escapeHtml(s) {
        return (s || '').replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]),
        );
      }

      function arrowSvg(type, reversed) {
        const t = type;
        const flip = reversed ? 'transform="translate(48,0) scale(-1,1)"' : '';
        if (t === 'none') {
          return `<svg width="48" height="14" viewBox="0 0 48 14" xmlns="http://www.w3.org/2000/svg"><line x1="10" y1="7" x2="38" y2="7" stroke="currentColor" stroke-width="1.6"/></svg>`;
        }
        let head = '';
        if (t === 'arrow') head = `<path d="M34 7 L28 3 L28 11 Z" fill="currentColor"/>`;
        if (t === 'circle') head = `<circle cx="32" cy="7" r="4" fill="currentColor"/>`;
        if (t === 'diamond') head = `<path d="M32 3 L36 7 L32 11 L28 7 Z" fill="currentColor"/>`;
        return `<svg width="48" height="14" viewBox="0 0 48 14" xmlns="http://www.w3.org/2000/svg"><g ${flip}><line x1="10" y1="7" x2="28" y2="7" stroke="currentColor" stroke-width="1.6"/>${head}</g></svg>`;
      }

      function renderArrowPreviews() {
        $('start-preview').innerHTML = arrowSvg(state.startArrow, true);
        $('end-preview').innerHTML = arrowSvg(state.endArrow, false);
      }

      const ARROW_CAP_VALUES = ['none', 'arrow', 'circle', 'diamond'];

      function closeArrowPickers() {
        document.querySelectorAll('.arrow-picker-panel').forEach((panel) => {
          panel.hidden = true;
          const tr = panel.closest('.arrow-picker').querySelector('.arrow-picker-trigger');
          if (tr) tr.setAttribute('aria-expanded', 'false');
        });
      }

      function syncArrowPickerSelection(rootId, value) {
        const root = $(rootId);
        if (!root) return;
        root.querySelectorAll('.arrow-picker-option').forEach((btn) => {
          const sel = btn.dataset.value === value;
          btn.setAttribute('aria-selected', String(sel));
          btn.classList.toggle('arrow-picker-option-selected', sel);
        });
      }

      function initArrowPickers() {
        function wire(rootId, stateKey, reversed) {
          const root = $(rootId);
          const panel = root.querySelector('.arrow-picker-panel');
          const trigger = root.querySelector('.arrow-picker-trigger');
          ARROW_CAP_VALUES.forEach((val) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'arrow-picker-option';
            btn.dataset.value = val;
            btn.setAttribute('role', 'option');
            btn.innerHTML = arrowSvg(val, reversed);
            btn.addEventListener('click', (ev) => {
              ev.stopPropagation();
              state[stateKey] = val;
              syncArrowPickerSelection(rootId, val);
              renderArrowPreviews();
              emit();
              closeArrowPickers();
            });
            panel.appendChild(btn);
          });
          trigger.addEventListener('click', (ev) => {
            ev.stopPropagation();
            const willOpen = panel.hidden;
            closeArrowPickers();
            if (willOpen) {
              syncArrowPickerSelection(rootId, state[stateKey]);
              panel.hidden = false;
              trigger.setAttribute('aria-expanded', 'true');
            }
          });
        }
        wire('picker-start', 'startArrow', true);
        wire('picker-end', 'endArrow', false);
        document.addEventListener(
          'pointerdown',
          (e) => {
            const el = e.target;
            if (el && typeof el.closest === 'function' && el.closest('.arrow-picker')) return;
            closeArrowPickers();
          },
          true,
        );
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeArrowPickers();
        });
      }

      // -----------------------------------------------------------------
      // Wire up controls
      // -----------------------------------------------------------------

      $('active-toggle').onclick = () => {
        active = !active;
        $('active-toggle').classList.toggle('on', active);
        document.body.classList.toggle('disabled', !active);
        post({ type: 'set-active', active });
        scheduleResize();
      };

      // Remember-label is a PER-PRESET setting (which presets keep their label
      // text). Persisted via clientStorage on the sandbox side (see
      // 'save-preset-remember' / 'preset-remember') rather than the UI
      // iframe's own localStorage — Figma doesn't reliably keep the iframe's
      // localStorage across a plugin close/reopen, so a toggle saved there
      // could silently revert to its default on the next open. Built-in
      // Success/Error default on, everything else off. `rememberLabel`
      // mirrors the ACTIVE preset and is the value pushed to the sandbox.
      const DEFAULT_REMEMBER = { success: true, error: true };
      let presetRemember = {};
      function getRemember(name) {
        const n = name || 'default';
        return n in presetRemember ? !!presetRemember[n] : !!DEFAULT_REMEMBER[n];
      }
      let rememberLabel = getRemember(activePreset);
      // Reflect the active preset's flag in the toggle and push it to the
      // sandbox. Call whenever the active preset changes.
      function applyRememberLabel(push) {
        rememberLabel = getRemember(activePreset);
        $('remember-label-toggle').classList.toggle('on', rememberLabel);
        if (push) post({ type: 'set-remember-label', on: rememberLabel });
      }
      $('remember-label-toggle').onclick = () => {
        const n = activePreset || 'default';
        presetRemember[n] = !getRemember(n);
        post({ type: 'save-preset-remember', remember: presetRemember });
        // Reflect the change in the label field immediately: turning OFF clears
        // it (this preset no longer auto-fills a label); turning ON restores
        // the preset's stored label.
        if (getRemember(n)) {
          const p = savedPresetStyles[n];
          state.label.text = p && p.label ? (p.label.text || '') : '';
        } else {
          state.label.text = '';
        }
        const li = $('label-text');
        if (li) li.value = state.label.text;
        applyRememberLabel(true);
        emit();
      };

      function bindNumber(id, key) {
        $(id).addEventListener('input', (e) => {
          const v = parseFloat(e.target.value);
          if (Number.isFinite(v)) {
            state[key] = v;
            emit();
          }
        });
      }
      bindNumber('opacity', 'opacity');
